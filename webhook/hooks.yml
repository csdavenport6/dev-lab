- id: infra
  execute-command: /scripts/redeploy-stack.sh
  command-working-directory: /workspace
  response-message: "infra redeploy triggered"
  trigger-rule:
    match:
      type: payload-hmac-sha256
      secret: '{{getenv "INFRA_HOOK_SECRET"}}'
      parameter:
        source: header
        name: X-Hub-Signature-256
