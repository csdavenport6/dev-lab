services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - blog

  blog:
    build: ./blog
    restart: unless-stopped
    expose:
      - "8080"

volumes:
  caddy_data:
  caddy_config:
