services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      blog:
        condition: service_healthy
      webhook:
        condition: service_started

  blog:
    image: ghcr.io/csdavenport6/cdavenport.io:latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  webhook:
    build: ./webhook
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - ./webhook/hooks.yml:/etc/webhook/hooks.yml:ro
      - ./webhook/scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:rw
      - /etc/dev-lab:/etc/dev-lab:ro
    env_file: /etc/dev-lab/webhook.env
    working_dir: /workspace
    command: ["-hooks=/etc/webhook/hooks.yml", "-verbose", "-port=9000", "-template", "-hotreload"]

volumes:
  caddy_data:
  caddy_config:
